colourful: true

filekinds:
  normal: { foreground: "#e0e0e0" }
  directory: { foreground: "#42a5f5", is_bold: true }
  symlink: { foreground: "#ce93d8" }
  pipe: { foreground: "#ffcc00" }
  block_device: { foreground: "#ff7043" }
  char_device: { foreground: "#ff7043" }
  socket: { foreground: "#ffcc00" }
  special: { foreground: "#ba68c8" }
  executable: { foreground: "#66bb6a", is_bold: true }
  mount_point: { foreground: "#26c6da", is_bold: true }

perms:
  user_read: { foreground: "#ef5350", is_bold: true }
  user_write: { foreground: "#fdd835", is_bold: true }
  user_execute_file: { foreground: "#66bb6a", is_bold: true }
  user_execute_other: { foreground: "#66bb6a", is_bold: true }
  group_read: { foreground: "#ef5350" }
  group_write: { foreground: "#fdd835" }
  group_execute: { foreground: "#66bb6a" }
  other_read: { foreground: "#ef5350" }
  other_write: { foreground: "#fdd835" }
  other_execute: { foreground: "#66bb6a" }
  special_user_file: { foreground: "#ba68c8" }
  special_other: { foreground: "#9e9e9e" }
  attribute: { foreground: "#bdbdbd" }

size:
  major: { foreground: "#bdbdbd" }
  minor: { foreground: "#4dd0e1" }
  number_byte: { foreground: "#b0bec5" }
  number_kilo: { foreground: "#4fc3f7" }
  number_mega: { foreground: "#42a5f5", is_bold: true }
  number_giga: { foreground: "#ba68c8", is_bold: true }
  number_huge: { foreground: "#ef5350", is_bold: true }
  unit_byte: { foreground: "#b0bec5" }
  unit_kilo: { foreground: "#4fc3f7" }
  unit_mega: { foreground: "#42a5f5" }
  unit_giga: { foreground: "#ba68c8" }
  unit_huge: { foreground: "#ef5350" }

users:
  user_you: { foreground: "#e0e0e0" }
  user_root: { foreground: "#ef5350", is_bold: true }
  user_other: { foreground: "#ff8a65" }
  group_yours: { foreground: "#b0bec5" }
  group_other: { foreground: "#9e9e9e" }
  group_root: { foreground: "#ef5350" }

links:
  normal: { foreground: "#42a5f5" }
  multi_link_file: { foreground: "#42a5f5" }

git:
  new: { foreground: "#66bb6a", is_bold: true }
  modified: { foreground: "#fdd835", is_bold: true }
  deleted: { foreground: "#ef5350", is_bold: true }
  renamed: { foreground: "#26c6da", is_bold: true }
  typechange: { foreground: "#ce93d8" }
  ignored: { foreground: "#757575" }
  conflicted: { foreground: "#ff7043", is_bold: true }

git_repo:
  branch_main: { foreground: "#b0bec5" }
  branch_other: { foreground: "#ba68c8" }
  git_clean: { foreground: "#66bb6a" }
  git_dirty: { foreground: "#ef5350" }

security_context:
  colon: { foreground: "#757575" }
  user: { foreground: "#9e9e9e" }
  role: { foreground: "#ba68c8" }
  typ: { foreground: "#757575" }
  range: { foreground: "#ba68c8" }

file_type:
  image: { foreground: "#fdd835" }
  video: { foreground: "#ef5350" }
  music: { foreground: "#66bb6a" }
  lossless: { foreground: "#26c6da" }
  crypto: { foreground: "#9e9e9e" }
  document: { foreground: "#e0e0e0" }
  compressed: { foreground: "#ce93d8" }
  temp: { foreground: "#ff8a65" }
  compiled: { foreground: "#4dd0e1" }
  source: { foreground: "#42a5f5" }

punctuation: { foreground: "#757575" }
date: { foreground: "#fdd835" }
inode: { foreground: "#b0bec5" }
blocks: { foreground: "#757575" }
header: { foreground: "#e0e0e0", is_bold: true }
octal: { foreground: "#26c6da" }
flags: { foreground: "#ba68c8" }

symlink_path: { foreground: "#4dd0e1" }
control_char: { foreground: "#4fc3f7" }
broken_symlink: { foreground: "#ef5350", is_bold: true }
broken_path_overlay: { foreground: "#757575" }
